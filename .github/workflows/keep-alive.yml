name: Keep Render Awake

on:
  schedule:
    - cron: '*/7 * * * *'  # Automates it to run every 7 minutes
  workflow_dispatch:       # Keeps your manual "Run Workflow" button active

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: curl https://resume-builder-z1tx.onrender.com
